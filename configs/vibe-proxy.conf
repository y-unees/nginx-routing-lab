# ----------------------------------------------------
# BLOCK 1: HTTP Redirector (Port 80)
# ----------------------------------------------------
server {
    listen 80;
    server_name vibe.unishdhungana.com.np;

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
}

# ----------------------------------------------------
# BLOCK 2: HTTPS Reverse Proxy (Port 443)
# ----------------------------------------------------
server {
    listen 443 ssl;
    server_name vibe.unishdhungana.com.np;

    # SSL Certificates (Managed by Certbot)
    ssl_certificate     /etc/letsencrypt/live/vibe.unishdhungana.com.np/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vibe.unishdhungana.com.np/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # --- NetSec Hardening Headers (Preserved from Phase 2) ---
    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    # --- Reverse Proxy Logic ---
    location / {
        # Pass the request to the Next.js app running via PM2
        proxy_pass http://127.0.0.1:3000;
        
        # Standard Proxy Headers for proper App routing
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Forwarding client info so Next.js knows the real visitor IP
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Error handling
    error_page 502 /502.html;
    location = /502.html {
        root /var/www/html;
        internal;
    }
}